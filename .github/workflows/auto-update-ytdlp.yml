name: Auto-update yt-dlp

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if version matches'
        required: false
        default: 'false'
        type: boolean
      auto_merge:
        description: 'Auto-merge the PR without review'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get latest yt-dlp release from GitHub
        id: latest
        run: |
          RELEASE_JSON=$(curl -sf https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest)

          if [ -z "$RELEASE_JSON" ]; then
            echo "::error::Failed to fetch latest yt-dlp release from GitHub"
            exit 1
          fi

          LATEST=$(echo "$RELEASE_JSON" | python3 -c "import sys, json; print(json.load(sys.stdin)['tag_name'])")
          RELEASE_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys, json; print(json.load(sys.stdin)['html_url'])")

          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "Latest yt-dlp release: $LATEST"

      - name: Read current tracked version
        id: current
        run: |
          if [ -f .github/.ytdlp-version ]; then
            CURRENT=$(cat .github/.ytdlp-version | tr -d '[:space:]')
          else
            CURRENT="unknown"
          fi
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Currently tracked yt-dlp version: $CURRENT"

      - name: Compare versions
        id: compare
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          FORCE="${{ inputs.force }}"

          echo "Latest:  $LATEST"
          echo "Current: $CURRENT"

          if [ "$LATEST" != "$CURRENT" ] || [ "$FORCE" = "true" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed: $CURRENT → $LATEST"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date"
          fi

      - name: Check for existing PR
        if: steps.compare.outputs.needs_update == 'true'
        id: existing_pr
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          BRANCH="auto-update/yt-dlp-${LATEST}"

          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already open for yt-dlp ${LATEST}, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update tracked version
        if: steps.compare.outputs.needs_update == 'true' && steps.existing_pr.outputs.skip != 'true'
        run: |
          echo "${{ steps.latest.outputs.version }}" > .github/.ytdlp-version

      - name: Update requirements.txt floor
        if: steps.compare.outputs.needs_update == 'true' && steps.existing_pr.outputs.skip != 'true'
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          sed -i "s/yt-dlp\[default\]>=.*/yt-dlp[default]>=${LATEST}/" python/requirements.txt
          echo "Updated requirements.txt:"
          grep yt-dlp python/requirements.txt

      - name: Bump app patch version
        if: steps.compare.outputs.needs_update == 'true' && steps.existing_pr.outputs.skip != 'true'
        id: bump
        run: |
          NEW_APP_VERSION=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const parts = pkg.version.split('.');
            parts[2] = parseInt(parts[2]) + 1;
            pkg.version = parts.join('.');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log(pkg.version);
          ")
          echo "app_version=$NEW_APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped app version to $NEW_APP_VERSION"

      - name: Create branch and commit
        if: steps.compare.outputs.needs_update == 'true' && steps.existing_pr.outputs.skip != 'true'
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          APP_VERSION="${{ steps.bump.outputs.app_version }}"
          BRANCH="auto-update/yt-dlp-${LATEST}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add .github/.ytdlp-version python/requirements.txt package.json
          git commit -m "chore: update yt-dlp ${CURRENT} → ${LATEST}" \
            -m "- Bumps yt-dlp from ${CURRENT} to ${LATEST}" \
            -m "- App version bumped to v${APP_VERSION}" \
            -m "- Release: https://github.com/yt-dlp/yt-dlp/releases/tag/${LATEST}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.compare.outputs.needs_update == 'true' && steps.existing_pr.outputs.skip != 'true'
        id: create_pr
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          APP_VERSION="${{ steps.bump.outputs.app_version }}"
          RELEASE_URL="${{ steps.latest.outputs.release_url }}"
          BRANCH="auto-update/yt-dlp-${LATEST}"

          PR_BODY="## yt-dlp dependency update

          | | Version |
          |---|---|
          | **yt-dlp (old)** | \`${CURRENT}\` |
          | **yt-dlp (new)** | \`${LATEST}\` |
          | **App version** | \`v${APP_VERSION}\` |

          ### What changed
          - Updated \`.github/.ytdlp-version\` tracking file
          - Updated \`python/requirements.txt\` minimum version floor
          - Bumped app patch version in \`package.json\`

          ### yt-dlp release notes
          ${RELEASE_URL}

          ---
          *This PR was created automatically by the [auto-update-ytdlp](.github/workflows/auto-update-ytdlp.yml) workflow.*
          *Merging this PR will automatically create a release tag and trigger builds for macOS and Windows.*"

          PR_BODY=$(echo "$PR_BODY" | sed 's/^          //')

          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --title "chore: update yt-dlp to ${LATEST}" \
            --body "$PR_BODY")

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (if requested)
        if: steps.create_pr.outputs.pr_url && inputs.auto_merge == 'true'
        run: |
          gh pr merge "${{ steps.create_pr.outputs.pr_url }}" --auto --squash
          echo "Auto-merge enabled for ${{ steps.create_pr.outputs.pr_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
