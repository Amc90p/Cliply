name: Auto-release on merge

on:
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  contents: write
  actions: write

jobs:
  tag-and-build:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'auto-update/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      # -r TAG: checkout the tagged commit (default branch alone can race if master moved)
      - name: Trigger build
        run: gh workflow run build-release.yml -f tag=${{ steps.tag.outputs.tag }} -r ${{ steps.tag.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
